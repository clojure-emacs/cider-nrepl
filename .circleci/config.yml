version: 2.1

# Default settings for executors

defaults: &defaults
  working_directory: ~/repo
  environment:
    JVM_OPTS: >
      -Xmx3200m
      -Dclojure.main.report=stderr

# Runners for various OpenJDK versions, using the tools-deps (clojure CLI) images.

executors:
  jdk8:
    docker:
      - image: clojure:temurin-8-noble
    <<: *defaults
  jdk11:
    docker:
      - image: clojure:temurin-11-noble
    <<: *defaults
  jdk17:
    docker:
      - image: clojure:temurin-17-noble
    <<: *defaults
  jdk21:
    docker:
      - image: clojure:temurin-21-noble
    <<: *defaults
  jdk25:
    docker:
      - image: clojure:temurin-25-noble
    <<: *defaults
  jdk26:
    docker:
      - image: clojure:temurin-26-noble
    <<: *defaults

# Runs a given set of steps, with some standard pre- and post-
# steps, including restoring of cache, saving of cache.
#
# Adapted from https://github.com/lambdaisland/meta/blob/master/circleci/clojure_orb.yml

commands:
  with_cache:
    description: |
      Run a set of steps with Maven dependencies and Clojure classpath cache
      files cached.
      This command restores ~/.m2, ~/.gitlibs and .cpcache if they were
      previously cached, then runs the provided steps, and finally saves the
      cache. The cache-key is generated based on the contents of `deps.edn`.
    parameters:
      steps:
        type: steps
      files:
        description: Files to consider when creating the cache key
        type: string
        default: "deps.edn build/main.clj"
      cache_version:
        type: string
        description: "Change this value to force a cache update"
        default: "1"
    steps:
      - run:
          name: Generate Cache Checksum
          command: |
            for file in << parameters.files >>
            do
              find . -name $file -exec cat {} +
            done | sha256sum | awk '{print $1}' > /tmp/clojure_cache_seed
      - restore_cache:
          key: clojure-<< parameters.cache_version >>-{{ checksum "/tmp/clojure_cache_seed" }}
      - steps: << parameters.steps >>
      - save_cache:
          paths:
            - ~/.m2
            - ~/.gitlibs
            - .cpcache
            - base-jdk-src.zip
          key: clojure-<< parameters.cache_version >>-{{ checksum "/tmp/clojure_cache_seed" }}

jobs:

  lint:
    description: |
      Running linters
    executor: jdk26
    environment:
      CLOJURE_VERSION: "1.12"
    steps:
      - checkout
      - with_cache:
          cache_version: "lint_v1"
          steps:
            - run:
                name: Running cljfmt
                command: make cljfmt
            - run:
                name: Running clj-kondo
                command: make kondo
            - run:
                name: Running Eastwood
                command: make eastwood
            - run:
                name: Checking the descriptor return contract
                command: make descriptor-contract

  deploy:
    # JDK 8 is preferred for deployments, to keep the bundled Java classes
    # (e.g. cljfmt's diffutils, repackaged by mranderson) JDK 8 compatible.
    executor: jdk8
    steps:
      - checkout
      - run:
          name: Deploy
          command: make deploy

  test:
    description: |
      Run quick tests (against the non-inlined dependencies)
    parameters:
      jdk_version:
        type: string
      clojure_version:
        type: string
      nrepl_version:
        type: string
        default: "1.7"
    executor: << parameters.jdk_version >>
    environment:
      CLOJURE_VERSION: << parameters.clojure_version >>
      JDK_SRC_VERSION: << parameters.jdk_version >>
      NREPL_VERSION: << parameters.nrepl_version >>
    steps:
      - checkout
      - with_cache:
          cache_version: "test_v1_<< parameters.clojure_version >>_<< parameters.jdk_version >>_<< parameters.nrepl_version >>"
          steps:
            - run:
                name: Setting up JDK sources
                command: make copy-sources-to-jdk
            - run:
                name: Running quick tests
                command: make quick-test

  cljs-test:
    description: |
      Run the ClojureScript middleware tests (JDK21+ only, since CLJS 1.12's
      Closure compiler requires a recent JDK)
    parameters:
      jdk_version:
        type: string
      clojure_version:
        type: string
    executor: << parameters.jdk_version >>
    environment:
      CLOJURE_VERSION: << parameters.clojure_version >>
      JDK_SRC_VERSION: << parameters.jdk_version >>
    steps:
      - checkout
      - run: apt-get update && apt-get install -y nodejs
      - with_cache:
          cache_version: "cljs_test_v1_<< parameters.clojure_version >>_<< parameters.jdk_version >>"
          steps:
            - run:
                name: Setting up JDK sources
                command: make copy-sources-to-jdk
            - run:
                name: Running ClojureScript tests
                command: make cljs-test

  full-test:
    description: |
      Run the full suite against the inlined/shaded dependencies, plus the smoketest
    parameters:
      jdk_version:
        type: string
      clojure_version:
        type: string
    executor: << parameters.jdk_version >>
    environment:
      CLOJURE_VERSION: << parameters.clojure_version >>
      JDK_SRC_VERSION: << parameters.jdk_version >>
      PROJECT_VERSION: 999.99.9
    steps:
      - checkout
      - with_cache:
          cache_version: "full_test_v1_<< parameters.clojure_version >>_<< parameters.jdk_version >>"
          steps:
            - run:
                name: Setting up JDK sources
                command: make copy-sources-to-jdk
            - run:
                name: Running tests with inlined deps
                command: make inlined-test
            - run:
                name: Running smoketest
                command: make smoketest

run_always: &run_always
  filters:
    branches:
      only: /.*/
    tags:
      only: /.*/

workflows:
  version: 2.1
  ci-test-matrix:
    jobs:
      - full-test:
          # Full (inlined) tests against latest Clojure and fringe JDKs.
          matrix:
            alias: "full-test"
            parameters:
              clojure_version: ["1.12"]
              jdk_version: [jdk8, jdk26]
          <<: *run_always
      - test:
          # Quick tests for older and unreleased Clojure versions and fringe JDKs.
          matrix:
            alias: "test-older-clojure"
            parameters:
              clojure_version: ["1.10", "1.11", "1.13"]
              jdk_version: [jdk8, jdk26]
          <<: *run_always
      - test:
          # Quick tests for latest Clojure and interim JDK versions.
          matrix:
            alias: "test-latest-clojure"
            parameters:
              clojure_version: ["1.12"]
              jdk_version: [jdk11, jdk17, jdk21, jdk25]
          <<: *run_always
      - test:
          # Test against multiple nREPL versions.
          matrix:
            alias: "nrepl-test"
            parameters:
              clojure_version: ["1.12"]
              jdk_version: [jdk26]
              nrepl_version: ["1.0", "1.3", "1.4", "1.5", "1.6", "1.7"]
          <<: *run_always
      - cljs-test:
          # ClojureScript tests only run on JDK21+ (CLJS 1.12 Closure needs it).
          matrix:
            alias: "cljs-test"
            parameters:
              clojure_version: ["1.12"]
              jdk_version: [jdk21, jdk25, jdk26]
          <<: *run_always
      - lint:
          <<: *run_always
      - deploy:
          requires:
            - full-test
            - test-older-clojure
            - test-latest-clojure
            - nrepl-test
            - cljs-test
            - lint
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v\d+\.\d+\.\d+(-(alpha|beta|rc)\d+)?$/
